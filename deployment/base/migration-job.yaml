apiVersion: batch/v1
kind: Job
metadata:
  name: rriv-api-migration-job
  labels:
    app: rriv-api
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: rriv-api
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "webapp"
        vault.hashicorp.com/auth-path: "auth/kubernetes-rriv"
        vault.hashicorp.com/agent-inject-secret-credentials.txt: "secret/data/rriv-api-creds"
        vault.hashicorp.com/agent-inject-template-credentials: |
          {{ with secret "secret/data/rriv-api-creds" }}
          export DATABASE_URL="{{ .Data.data.database_url }}"
          export DATABASE_CA_CRT="{{ .Data.data.database_ca_cert }}"
          {{ end }}
    spec:
      restartPolicy: Never
      serviceAccountName: internal-app
      imagePullSecrets:
        - name: registry-rriv
      containers:
        - name: rriv-api-migration-job
          command: ["/bin/sh", "-c"]
          args:
            - |
                timeout=20
                elapsed=0
                while [ ! -f /vault/secrets/credentials ]; do
                  if [ $elapsed -ge $timeout ]; then
                    echo "Timeout waiting for Vault to inject secrets"
                    exit 1
                  fi
                  echo "Waiting for Vault to inject secrets..."
                  sleep 2
                  elapsed=$((elapsed + 2))
                done
                echo "Vault secrets injected"
                . /vault/secrets/credentials
                echo $DATABASE_CA_CRT > ca.crt
                perl -pe 's/\s(?!CERTIFICATE)/\n/g' ca.crt > ca-certificate.crt
                rm ca.crt
                echo "starting service"
                #while :; do echo 'Hit CTRL+C'; sleep 1; done # go forever
                exec deno task prisma migrate deploy
          image: registry.digitalocean.com/rriv/rriv-api:1.0.5
          env:
            - name: DATABASE_SCHEMA
              value: rriv
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 200m
              memory: 384Mi
