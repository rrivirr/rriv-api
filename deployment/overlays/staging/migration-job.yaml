apiVersion: batch/v1
kind: Job
metadata:
  name: rriv-api-migration-job
  labels:
    app: rriv-api
spec:
  template:
    metadata:
      annotations:
        vault.hashicorp.com/agent-inject-secret-credentials.txt: "secret/data/staging-rriv-api-creds"
        vault.hashicorp.com/agent-inject-template-credentials: |
          {{ with secret "secret/data/staging-rriv-api-creds" }}
          export DATABASE_URL="{{ .Data.data.database_url }}"
          export DATABASE_CA_CRT="{{ .Data.data.database_ca_cert }}"
          {{ end }}
